<!DOCTYPE html><html lang="fa" dir="rtl"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">    <title>MafiaSun • فروشگاه</title>    <style>        :root { --bg:#0a0a0f; --gold:#f0c040; --gold2:#d4a020; --red:#c0392b; --card:rgba(18,18,35,0.8); --card2:rgba(22,22,40,0.85); --text:#e0e0e0; --border:#2a2a40; --green:#27ae60; --toman:#4fc3f7; }        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }        body { background:#05050a; font-family:'Segoe UI',Tahoma,Arial,sans-serif; display:flex; justify-content:center; align-items:center; min-height:100vh; color:var(--text); }        .app-container { width:100%; max-width:480px; height:100vh; background:var(--bg); display:flex; flex-direction:column; position:relative; overflow:hidden; box-shadow:0 0 60px rgba(0,0,0,0.5); }        .bg-particles { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; background:radial-gradient(ellipse at 20% 30%, rgba(240,192,64,0.04) 0%, transparent 50%), radial-gradient(ellipse at 80% 70%, rgba(192,57,43,0.04) 0%, transparent 50%); }        .app-header { position:sticky; top:0; z-index:10; background:rgba(10,10,20,0.8); backdrop-filter:blur(20px); padding:10px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid rgba(255,255,255,0.08); }        .logo { font-size:1.6rem; font-weight:900; background:linear-gradient(135deg, var(--gold), #fff, var(--gold2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }        .wallet { display:flex; gap:10px; font-size:0.8rem; font-weight:700; }        .wallet-badge { padding:6px 14px; border-radius:20px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); display:flex; align-items:center; gap:5px; }        .wallet-badge.gems { color:var(--gold); } .wallet-badge.coins { color:#a0d9ff; }        .wallet-badge .icon-img { width:18px; height:18px; object-fit:contain; }        .app-content { flex:1; overflow-y:auto; padding:15px 15px 20px; scrollbar-width:thin; z-index:1; }        .section-card { background:var(--card); border-radius:20px; padding:18px; border:1px solid var(--border); margin-bottom:18px; backdrop-filter:blur(8px); }        .section-title { font-size:1.2rem; font-weight:800; margin-bottom:15px; color:var(--gold); display:flex; align-items:center; gap:6px; }        .items-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }        .item-card { background:var(--card2); border-radius:16px; overflow:hidden; border:1px solid var(--border); transition:0.2s; display:flex; flex-direction:column; position:relative; }        .item-card:active { transform:scale(0.97); border-color:var(--gold); }        .discount-badge { position:absolute; top:8px; left:8px; background:#e74c3c; color:#fff; padding:3px 10px; border-radius:12px; font-weight:700; font-size:0.7rem; z-index:2; }        .item-img { width:100%; height:110px; object-fit:cover; background:#1a1a30; display:none; } /* مخفی کردن عکس‌ها */        .item-info { padding:12px; flex:1; display:flex; flex-direction:column; gap:5px; }        .item-name { font-weight:700; font-size:0.85rem; color:#fff; }        .item-stock { font-size:0.7rem; color:#aaa; }        .item-price { font-weight:700; font-size:0.9rem; } .item-price.gems { color:var(--gold); } .item-price.toman { color:var(--toman); }        .item-price .original { text-decoration:line-through; color:#888; font-size:0.75rem; margin-left:6px; }        .buy-btn { padding:9px; border-radius:18px; border:none; cursor:pointer; font-weight:700; font-size:0.8rem; background:rgba(255,255,255,0.08); color:#ccc; width:100%; margin-top:auto; border:1px solid rgba(255,255,255,0.1); }        .buy-btn:active:not(:disabled):not(.owned) { background:rgba(240,192,64,0.25); color:#fff; }        .buy-btn:disabled { color:#555; } .buy-btn.owned { background:rgba(39,174,96,0.2); border-color:var(--green); color:var(--green); cursor:default; }        .coin-panel { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-top:10px; }        .coin-pkg-card { background:var(--card2); border-radius:16px; padding:15px; border:1px solid var(--border); text-align:center; cursor:pointer; transition:0.2s; }        .coin-pkg-card:active { border-color:var(--toman); background:#1e1e35; transform:scale(0.97); }        .coin-amount { font-size:1.4rem; font-weight:900; color:#fff; margin-bottom:5px; } .coin-price { font-weight:700; color:var(--toman); font-size:0.9rem; }        .daily-grid { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin:15px 0; }        .daily-day { width:42px; height:42px; border-radius:50%; background:#1a1a30; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.9rem; transition:0.3s; }        .daily-day.claimed { background:var(--green); border-color:var(--green); color:#fff; } .daily-day.current { border-color:var(--gold); animation:pulse 1.5s infinite; background:rgba(240,192,64,0.15); } .daily-day.locked { opacity:0.4; }        @keyframes pulse { 0%,100%{ box-shadow:0 0 8px rgba(240,192,64,0.3); } 50%{ box-shadow:0 0 20px rgba(240,192,64,0.6); } }        .claim-btn { display:block; width:100%; padding:12px; border-radius:20px; background:linear-gradient(135deg, #f0c040, #d4a020); border:none; font-weight:700; cursor:pointer; color:#1a1a10; font-size:0.95rem; } .claim-btn:active { transform:scale(0.98); } .claim-btn:disabled { background:#444; color:#888; }        .bottom-nav { background:rgba(10,10,20,0.9); backdrop-filter:blur(20px); border-top:1px solid rgba(255,255,255,0.08); display:flex; justify-content:space-around; padding:8px 10px; z-index:10; }        .nav-item { display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; color:#888; font-size:0.7rem; font-weight:600; padding:6px 12px; border-radius:20px; } .nav-item.active { color:var(--gold); background:rgba(240,192,64,0.1); } .nav-item svg { width:22px; height:22px; fill:currentColor; }        .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:50; display:none; align-items:center; justify-content:center; backdrop-filter:blur(4px); } .modal-overlay.open { display:flex; }        .modal { background:#141428; border-radius:24px; padding:25px; width:90%; max-width:420px; max-height:80vh; overflow-y:auto; border:1px solid var(--border); position:relative; } .modal h3 { color:var(--gold); margin-bottom:15px; }        .close-btn { position:absolute; top:15px; left:15px; background:none; border:none; color:#fff; font-size:1.3rem; cursor:pointer; }        .form-group { margin-bottom:12px; } .form-group label { display:block; font-size:0.8rem; color:#ccc; margin-bottom:4px; }        .form-group input, .form-group textarea, .form-group select { width:100%; padding:10px; border-radius:10px; background:#1a1a30; border:1px solid var(--border); color:#fff; font:inherit; }        .submit-btn { width:100%; padding:12px; border-radius:20px; background:var(--red); color:#fff; border:none; font-weight:700; cursor:pointer; }        .ticket-item { background:#1a1a30; border-radius:12px; padding:12px; margin-top:10px; font-size:0.85rem; border:1px solid var(--border); }        .reply { background:#222240; border-radius:8px; padding:8px; margin-top:6px; border-left:3px solid #2980b9; font-size:0.8rem; } .reply.support { border-left-color:var(--green); background:#1a2a20; }        .admin-login-btn { background:var(--gold); color:#000; padding:10px 20px; border-radius:20px; border:none; font-weight:700; cursor:pointer; margin-top:15px; display:inline-block; }        .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#1e1e30; color:#fff; padding:12px 25px; border-radius:25px; z-index:100; font-weight:600; animation:toastIn 0.3s ease; border:1px solid var(--gold); white-space:nowrap; }        @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(20px);} to{opacity:1;transform:translateX(-50%) translateY(0);} }    </style></head><body><div class="app-container">    <div class="bg-particles"></div>    <header class="app-header">        <div class="logo">MAFIA SUN</div>        <div class="wallet">            <div class="wallet-badge gems">                <img src="https://cdn.imgurl.ir/uploads/p779434_InShot_20260602_223126231.png" class="icon-img" alt="جم">                <span id="gemsAmount">0</span>            </div>            <div class="wallet-badge coins">                <span>🪙</span>                <span id="coinsAmount">0</span>            </div>        </div>    </header>    <div class="app-content" id="appContent"></div>    <nav class="bottom-nav">        <div class="nav-item active" data-tab="shop"><svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-9.8-3.2l-.9-1.8h13.4l-2.5-4.5-7.6-.2-2-4H3v2h2.6l3.6 7.5z"/></svg><span>خریدها</span></div>        <div class="nav-item" data-tab="land"><svg viewBox="0 0 24 24"><path d="M12 2L2 22h20L12 2zm0 3.6L19.5 20h-15L12 5.6z"/></svg><span>زمین</span></div>        <div class="nav-item" data-tab="pro"><svg viewBox="0 0 24 24"><path d="M12 2l3.1 6.3L22 9.3l-5 4.9L18.2 22 12 18.6 5.8 22 7 14.2 2 9.3l6.9-1L12 2z"/></svg><span>پرو</span></div>        <div class="nav-item" data-tab="tickets"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v4c1.1 0 2 .9 2 2s-.9 2-2 2v4c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2v-4c-1.1 0-2-.9-2-2s.9-2 2-2V4c0-1.1-.9-2-2-2zm-2 13H6v-2h12v2zm0-4H6v-2h12v2z"/></svg><span>تیکت</span></div>    </nav></div><script>    (function() {        const JSONBIN_ID = '6984ae3a43b1c97be967c32b';        const JSONBIN_KEY = '$2a$10$P2f/7ECPzq3HSI.6DSdcr.MaV748WQF7smMQL1bczP6YF4XKwjNvG';        const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_ID}`;        const ADMIN_CREDENTIALS = [            { phone: '09904844031', password: 'Admin16172-matin-1000' },            { phone: '09904845012', password: 'Admin16172-matin-1000' },            { phone: '09190882182', password: 'Admin16172-matin-1000' }        ];        let currentUser = { userId: null, userName: 'بازیکن', gems: 100, coins: 600, tickets: [], purchases: [], daily: { dayIndex:0, lastClaimDate:null, completedDays:[] }, toman: 500000 };        let allUsers = {};        let isAdminLoggedIn = false;        const specialItems = [            { id:'s1', name:'شمشیر افسانه ای', img:'', price_toman:150000 },            { id:'s2', name:'زره نفوذناپذیر', img:'', price_toman:200000 },            { id:'s3', name:'معجون حیات', img:'', price_toman:80000 },            { id:'s4', name:'طلسم محافظ', img:'', price_toman:120000 },            { id:'s5', name:'کلید مخفی', img:'', price_toman:90000 },            { id:'s6', name:'نقشه گنج', img:'', price_toman:180000 },        ];        const bgItems = Array.from({length:8},(_,i)=>({ id:'bg'+(i+1), name:'پس زمینه ' + ['تاریک','جنگل','شهر','بیابان','آسمان','اقیانوس','کوهستان','آتشفشان'][i], img:'', price_gems:60+(i+1)*15 }));        const chestItems = Array.from({length:7},(_,i)=>({ id:'chest'+(i+1), name:'صندوق ' + ['معمولی','نقره ای','طلایی','الماسی','اسرارآمیز','کهن','نفرین شده'][i], img:'', price_gems:40+(i+1)*25 }));        const proItems = [            { id:'pro1', name:'پرو پلاس', img:'', price_toman:300000 },            { id:'pro2', name:'پرو مکس', img:'', price_toman:500000 },            { id:'pro3', name:'پرو التیمیت', img:'', price_toman:900000 },            { id:'pro4', name:'VIP نقره ای', img:'', price_toman:200000 },            { id:'pro5', name:'VIP طلایی', img:'', price_toman:600000, discount:400000 },            { id:'pro6', name:'VIP الماسی', img:'', price_toman:1200000 },        ];        function toast(msg, type='info') {            const old = document.querySelector('.toast'); if(old) old.remove();            const t = document.createElement('div'); t.className='toast'; t.textContent=msg;            if(type==='error') t.style.borderColor='#e74c3c';            if(type==='success') t.style.borderColor='#27ae60';            document.querySelector('.app-container').appendChild(t);            setTimeout(()=>t.remove(), 2500);        }        async function loadAllUsers() {            try {                const resp = await fetch(JSONBIN_URL, { headers: { 'X-Master-Key': JSONBIN_KEY } });                if (!resp.ok) throw new Error();                const data = await resp.json();                allUsers = data.record?.users || {};                const uid = localStorage.getItem('mafiaSun_userId');                if (uid && allUsers[uid]) {                    currentUser = { userId: uid, ...allUsers[uid] };                } else {                    currentUser.userId = Date.now().toString();                    localStorage.setItem('mafiaSun_userId', currentUser.userId);                    await saveAllUsers();                }            } catch(e) { console.warn('آفلاین'); }            updateWalletDisplay();            renderCurrentTab();        }        async function saveAllUsers() {            allUsers[currentUser.userId] = {                userName: currentUser.userName, gems: currentUser.gems, coins: currentUser.coins,                tickets: currentUser.tickets, purchases: currentUser.purchases, daily: currentUser.daily, toman: currentUser.toman            };            try {                await fetch(JSONBIN_URL, {                    method: 'PUT',                    headers: { 'X-Master-Key': JSONBIN_KEY, 'Content-Type': 'application/json' },                    body: JSON.stringify({ users: allUsers })                });            } catch(e) { console.warn('ذخیره ناموفق'); }        }        function updateWalletDisplay() {            document.getElementById('gemsAmount').textContent = currentUser.gems.toLocaleString('fa-IR');            document.getElementById('coinsAmount').textContent = currentUser.coins.toLocaleString('fa-IR');        }        function getToday() { return new Date().toISOString().split('T')[0]; }        function isPurchased(id) { return currentUser.purchases.includes(id); }        function renderShop() {            return `            <div class="section-card">                <div class="section-title">آیتم های ویژه</div>                <div class="items-grid">${specialItems.map((item, idx) => {                    let order = idx;                    if(idx === 1) order = 2;                    if(idx === 2) order = 1;                    return `<div class="item-card" style="order:${order}">                        <div class="item-info">                            <div class="item-name">${item.name}</div>                            <div class="item-price toman">${item.price_toman.toLocaleString('fa-IR')} تومان</div>                            <button class="buy-btn" data-action="buy-special" data-id="${item.id}" data-price="${item.price_toman}">خرید</button>                        </div>                    </div>`;                }).join('')}</div>            </div>            <div class="section-card">                <div class="section-title">خرید سکه</div>                <div style="margin-bottom:10px; color:#aaa; font-size:0.9rem;">موجودی سکه: <strong style="color:#fff;">${currentUser.coins.toLocaleString('fa-IR')}</strong></div>                <div class="coin-panel">                    <div class="coin-pkg-card" data-coins="100" data-toman="5000"><div class="coin-amount">۱۰۰</div><div class="coin-price">۵,۰۰۰ تومان</div></div>                    <div class="coin-pkg-card" data-coins="500" data-toman="20000"><div class="coin-amount">۵۰۰</div><div class="coin-price">۲۰,۰۰۰ تومان</div></div>                    <div class="coin-pkg-card" data-coins="1200" data-toman="40000"><div class="coin-amount">۱,۲۰۰</div><div class="coin-price">۴۰,۰۰۰ تومان</div></div>                    <div class="coin-pkg-card" data-coins="3000" data-toman="90000"><div class="coin-amount">۳,۰۰۰</div><div class="coin-price">۹۰,۰۰۰ تومان</div></div>                </div>            </div>            <div class="section-card" style="text-align:center;">                <div class="section-title">سکه رایگان روزانه</div>                <div class="daily-grid">${Array.from({length:7}, (_,i)=>{                    let cls = 'daily-day';                    if(currentUser.daily.completedDays.includes(i)) cls += ' claimed';                    else if(i===currentUser.daily.dayIndex) cls += ' current';                    else if(i>currentUser.daily.dayIndex) cls += ' locked';                    return `<div class="${cls}">${i+1}</div>`;                }).join('')}</div>                <button class="claim-btn" id="dailyClaimBtn" ${currentUser.daily.lastClaimDate===getToday() || currentUser.daily.dayIndex>=7 ? 'disabled' : ''}>${currentUser.daily.lastClaimDate===getToday() ? 'دریافت شد' : 'دریافت سکه روزانه'}</button>                <div style="color:#888; margin-top:8px; font-size:0.8rem;">${currentUser.daily.lastClaimDate===getToday() ? 'امروز دریافت کردید' : (currentUser.daily.dayIndex<7 ? `روز ${currentUser.daily.dayIndex+1} از ۷` : 'چرخه کامل شد')}</div>            </div>`;        }        function renderLand() {            return `            <div class="section-card"><div class="section-title">پس زمینه ها</div><div class="items-grid">${bgItems.map(i=>landCard(i)).join('')}</div></div>            <div class="section-card"><div class="section-title">صندوق ها</div><div class="items-grid">${chestItems.map(i=>landCard(i)).join('')}</div></div>`;        }        function landCard(item) {            const owned = isPurchased(item.id);            const canBuy = !owned && currentUser.gems >= item.price_gems;            return `<div class="item-card">                <div class="item-info">                    <div class="item-name">${item.name}</div>                    <div class="item-stock">موجودی: ${owned?'0':'1'}</div>                    <div class="item-price gems">${item.price_gems.toLocaleString('fa-IR')} جم</div>                    <button class="buy-btn ${owned?'owned':''}" data-action="buy-land" data-id="${item.id}" data-price="${item.price_gems}" ${!canBuy||owned?'disabled':''}>${owned?'خریداری شده':(canBuy?'خرید':'جم ناکافی')}</button>                </div>            </div>`;        }        function renderPro() {            return `<div class="section-card"><div class="section-title">اشتراک پرو</div><div class="items-grid">${proItems.map(item=>{                const owned = isPurchased(item.id);                const price = item.discount || item.price_toman;                const canBuy = !owned && currentUser.toman >= price;                return `<div class="item-card">                    ${item.discount?'<div class="discount-badge">تخفیف</div>':''}                    <div class="item-info">                        <div class="item-name">${item.name}</div>                        <div class="item-price toman">${item.discount?'<span class="original">'+item.price_toman.toLocaleString('fa-IR')+'</span> ':''}${price.toLocaleString('fa-IR')} تومان</div>                        <button class="buy-btn ${owned?'owned':''}" data-action="buy-pro" data-id="${item.id}" data-price="${price}" ${!canBuy||owned?'disabled':''}>${owned?'خریداری شده':(canBuy?'خرید':'تومان ناکافی')}</button>                    </div>                </div>`;            }).join('')}</div>`;        }        function renderTickets() {            if (isAdminLoggedIn) {                let html = `<div class="section-card"><div class="section-title">پنل مدیریت</div>`;                html += `<div class="form-group"><label>کد کاربری هدف</label><input type="text" id="targetUserId" placeholder="کد کاربری"></div>                <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px;">                    <button class="submit-btn" style="background:var(--gold); color:#000;" onclick="adminAdjust('gems', 100)">➕۱۰۰ جم</button>                    <button class="submit-btn" style="background:var(--gold); color:#000;" onclick="adminAdjust('gems', -50)">➖۵۰ جم</button>                    <button class="submit-btn" style="background:var(--gold); color:#000;" onclick="adminAdjust('coins', 200)">➕۲۰۰ سکه</button>                    <button class="submit-btn" style="background:var(--gold); color:#000;" onclick="adminAdjust('coins', -100)">➖۱۰۰ سکه</button>                </div>                <hr style="border-color:var(--border); margin:15px 0;">                <div style="display:flex; justify-content:space-between; align-items:center;">                    <h4 style="color:var(--gold);">تیکت‌های کاربران</h4>                    <button class="submit-btn" style="background:gray; width:auto; padding:5px 15px;" onclick="refreshTickets()">🔄 بروزرسانی</button>                </div>                <div id="allTickets">${renderAllTickets()}</div>                <button class="submit-btn" style="background:gray; margin-top:15px;" onclick="logoutAdmin()">خروج از پنل</button>`;                html += '</div>';                return html;            } else {                let html = `<div class="section-card"><div class="section-title">تیکت های پشتیبانی</div>`;                html += `<button class="submit-btn" id="openTicketModalBtn" style="margin-bottom:15px; background:var(--gold); color:#000;">ارسال تیکت جدید</button>`;                if(!currentUser.tickets.length) html += '<div style="color:#777;text-align:center;padding:20px;">هنوز تیکتی ثبت نشده.</div>';                else currentUser.tickets.forEach((t,i)=>{                    html += `<div class="ticket-item">                        <div style="display:flex;justify-content:space-between;color:var(--gold);"><span>#${i+1} ${t.subject}</span><span style="font-size:0.7rem;">${t.date}</span></div>                        <div style="margin:5px 0;">${t.description}</div>                        <div style="color:#888;font-size:0.75rem;">${t.name} | ${t.phone} | ${t.userId}</div>                        ${t.replies.map(r=>`<div class="reply ${r.from==='support'?'support':''}"><strong>${r.from==='support'?'پشتیبانی':'شما'}:</strong> ${r.text}</div>`).join('')}                    </div>`;                });                html += `<button class="admin-login-btn" id="showAdminLogin">ورود پشتیبانی</button>`;                html += '</div>';                return html;            }        }        function renderAllTickets() {            let ticketsHtml = '';            for (const [uid, user] of Object.entries(allUsers)) {                if (user.tickets && user.tickets.length) {                    user.tickets.forEach((t, i)=>{                        ticketsHtml += `<div class="ticket-item">                            <strong>${user.userName} (${uid})</strong> - ${t.subject}<br>                            <small>${t.description}</small>                            <div>${t.replies?.map(r=>`<div class="reply ${r.from==='support'?'support':''}">${r.text}</div>`).join('')||''}</div>                            <button class="submit-btn" style="background:var(--gold); color:#000; margin-top:5px;" onclick="adminReplyTicket('${uid}', ${i})">پاسخ</button>                            <button class="submit-btn" style="background:gray; margin-top:5px;" onclick="adminDeleteTicket('${uid}', ${i})">حذف</button>                        </div>`;                    });                }            }            return ticketsHtml || 'تیکتی وجود ندارد.';        }        function renderCurrentTab() {            const tab = document.querySelector('.nav-item.active')?.dataset?.tab || 'shop';            const app = document.getElementById('appContent');            if (tab === 'shop') app.innerHTML = renderShop();            else if (tab === 'land') app.innerHTML = renderLand();            else if (tab === 'pro') app.innerHTML = renderPro();            else if (tab === 'tickets') app.innerHTML = renderTickets();        }        async function refreshTickets() {            await loadAllUsers();            renderCurrentTab();            toast('لیست تیکت‌ها بروز شد');        }        async function buySpecial(id, price) {            if (currentUser.toman < price) return toast('تومان کافی نیست', 'error');            currentUser.toman -= price;            await saveAllUsers();            updateWalletDisplay();            renderCurrentTab();            toast('خرید موفق', 'success');        }        async function buyLand(id, price) {            if (isPurchased(id)) return toast('قبلاً خریداری شده', 'error');            if (currentUser.gems < price) return toast('جم کافی نیست', 'error');            currentUser.gems -= price;            currentUser.purchases.push(id);            await saveAllUsers();            updateWalletDisplay();            renderCurrentTab();            toast('زمین خریداری شد', 'success');        }        async function buyPro(id, price) {            if (isPurchased(id)) return toast('قبلاً خریداری شده', 'error');            if (currentUser.toman < price) return toast('تومان کافی نیست', 'error');            currentUser.toman -= price;            currentUser.purchases.push(id);            await saveAllUsers();            updateWalletDisplay();            renderCurrentTab();            toast('پرو فعال شد', 'success');        }        async function buyCoins(coins, toman) {            if (currentUser.toman < toman) return toast('تومان کافی نیست', 'error');            currentUser.toman -= toman;            currentUser.coins += coins;            await saveAllUsers();            updateWalletDisplay();            renderCurrentTab();            toast(`${coins.toLocaleString('fa-IR')} سکه اضافه شد`, 'success');        }        async function claimDaily() {            const today = getToday();            if (currentUser.daily.lastClaimDate === today) return toast('امروز دریافت شده', 'error');            if (currentUser.daily.dayIndex >= 7) { currentUser.daily.dayIndex=0; currentUser.daily.completedDays=[]; }            const rewards = [20,30,40,50,70,100,150];            const r = rewards[currentUser.daily.dayIndex]||20;            currentUser.coins += r;            currentUser.daily.completedDays.push(currentUser.daily.dayIndex);            currentUser.daily.dayIndex++;            currentUser.daily.lastClaimDate = today;            if (currentUser.daily.dayIndex>=7) { currentUser.daily.dayIndex=0; currentUser.daily.completedDays=[]; currentUser.daily.lastClaimDate=null; }            await saveAllUsers();            updateWalletDisplay();            renderCurrentTab();            toast(`${r} سکه رایگان دریافت شد`, 'success');        }        async function submitTicket(e) {            e.preventDefault();            const t = {                id: Date.now(),                name: document.getElementById('ticketName').value.trim(),                userId: document.getElementById('ticketUserId').value.trim(),                phone: document.getElementById('ticketPhone').value.trim(),                subject: document.getElementById('ticketSubject').value,                description: document.getElementById('ticketDesc').value.trim(),                date: new Date().toLocaleString('fa-IR'),                replies: []            };            currentUser.tickets.push(t);            allUsers[currentUser.userId] = { ...currentUser };            await saveAllUsers();            document.getElementById('ticketForm').reset();            document.getElementById('ticketSuccessMsg').style.display='block';            setTimeout(()=>document.getElementById('ticketSuccessMsg').style.display='none',3000);            renderCurrentTab();            toast('تیکت ارسال شد', 'success');            setTimeout(async ()=>{                const ticket = currentUser.tickets.find(tt=>tt.id===t.id);                if(ticket) {                    ticket.replies.push({from:'support', text:'سلام، تیکت بررسی شد. به زودی رسیدگی می‌شود.', date:new Date().toLocaleString('fa-IR')});                    allUsers[currentUser.userId] = { ...currentUser };                    await saveAllUsers();                    renderCurrentTab();                    toast('پاسخ پشتیبانی دریافت شد', 'info');                }            }, 5000);        }        window.adminAdjust = async function(type, amount) {            const uid = document.getElementById('targetUserId').value.trim();            if (!uid || !allUsers[uid]) return toast('کاربر یافت نشد', 'error');            if (type==='gems') allUsers[uid].gems = (allUsers[uid].gems||0) + amount;            else allUsers[uid].coins = (allUsers[uid].coins||0) + amount;            if (uid === currentUser.userId) { currentUser.gems = allUsers[uid].gems; currentUser.coins = allUsers[uid].coins; }            await saveAllUsers();            updateWalletDisplay();            renderCurrentTab();            toast('تغییرات اعمال شد', 'success');        };        window.adminReplyTicket = async function(uid, index) {            const reply = prompt('متن پاسخ:');            if (reply) {                allUsers[uid].tickets[index].replies = allUsers[uid].tickets[index].replies || [];                allUsers[uid].tickets[index].replies.push({ from:'support', text: reply, date: new Date().toLocaleString('fa-IR') });                await saveAllUsers();                renderCurrentTab();            }        };        window.adminDeleteTicket = async function(uid, index) {            if (confirm('حذف تیکت؟')) {                allUsers[uid].tickets.splice(index, 1);                await saveAllUsers();                renderCurrentTab();            }        };        window.logoutAdmin = function() {            isAdminLoggedIn = false;            renderCurrentTab();            toast('از پنل خارج شدید');        };        document.addEventListener('click', async (e) => {            const btn = e.target.closest('button');            if (!btn) return;            if (btn.id === 'dailyClaimBtn') await claimDaily();            if (btn.id === 'openTicketModalBtn') document.getElementById('ticketModal').classList.add('open');            if (btn.id === 'closeTicketModal') document.getElementById('ticketModal').classList.remove('open');            if (btn.id === 'showAdminLogin') document.getElementById('adminLoginModal').classList.add('open');            if (btn.id === 'closeAdminLogin') document.getElementById('adminLoginModal').classList.remove('open');            if (btn.id === 'adminLoginSubmit') {                const phone = document.getElementById('adminPhone').value.trim();                const pass = document.getElementById('adminPass').value.trim();                if (ADMIN_CREDENTIALS.some(a=> a.phone===phone && a.password===pass)) {                    isAdminLoggedIn = true;                    document.getElementById('adminLoginModal').classList.remove('open');                    renderCurrentTab();                    toast('وارد پنل مدیریت شدید', 'success');                } else {                    toast('اطلاعات نادرست', 'error');                }            }            if (btn.dataset.action === 'buy-special') await buySpecial(btn.dataset.id, +btn.dataset.price);            if (btn.dataset.action === 'buy-land') await buyLand(btn.dataset.id, +btn.dataset.price);            if (btn.dataset.action === 'buy-pro') await buyPro(btn.dataset.id, +btn.dataset.price);            const card = e.target.closest('.coin-pkg-card');            if (card) await buyCoins(+card.dataset.coins, +card.dataset.toman);        });        document.getElementById('ticketForm')?.addEventListener('submit', submitTicket);        document.querySelectorAll('.nav-item').forEach(item => {            item.addEventListener('click', function() {                document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));                this.classList.add('active');                renderCurrentTab();            });        });        loadAllUsers();    })();</script><div class="modal-overlay" id="ticketModal">    <div class="modal">        <button class="close-btn" id="closeTicketModal">✕</button>        <h3>ارسال تیکت</h3>        <form id="ticketForm">            <div class="form-group"><label>نام داخل بازی</label><input type="text" id="ticketName" required></div>            <div class="form-group"><label>کد کاربری</label><input type="text" id="ticketUserId" required></div>            <div class="form-group"><label>موبایل</label><input type="tel" id="ticketPhone" required></div>            <div class="form-group"><label>موضوع</label>                <select id="ticketSubject" required>                    <option value="">انتخاب...</option>                    <option>پرداخت</option><option>باگ</option><option>پیشنهاد</option><option>گزارش</option><option>متفرقه</option>                </select>            </div>            <div class="form-group"><label>توضیحات</label><textarea id="ticketDesc" rows="3" required></textarea></div>            <button type="submit" class="submit-btn">ارسال تیکت</button>        </form>        <div id="ticketSuccessMsg" style="color:var(--green);text-align:center;display:none;margin-top:10px;">تیکت ارسال شد. پاسخ به زودی.</div>    </div></div><div class="modal-overlay" id="adminLoginModal">    <div class="modal">        <button class="close-btn" id="closeAdminLogin">✕</button>        <h3>ورود پشتیبانی</h3>        <div class="form-group"><label>شماره موبایل</label><input type="tel" id="adminPhone" placeholder="0990..."></div>        <div class="form-group"><label>رمز عبور</label><input type="password" id="adminPass"></div>        <button class="submit-btn" id="adminLoginSubmit">ورود</button>    </div></div></body></html>
